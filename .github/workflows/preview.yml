# PR 배포 산출물 검증. PR 코드는 배포 자격증명이나 런타임 서비스 계정을
# 사용할 수 없다. 격리된 preview 프로젝트/서비스 계정을 마련하기 전에는
# Cloudflare/Cloud Run에 실제 배포하지 않는다.
name: preview

on:
  pull_request:

permissions:
  contents: read

jobs:
  frontend-preview-build:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      vars.CLOUDFLARE_ACCOUNT_ID != ''
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_TOSS_CLIENT_KEY: ${{ vars.VITE_TOSS_CLIENT_KEY }}
      VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
      VITE_SENTRY_ENVIRONMENT: preview
      VITE_SENTRY_RELEASE: pr-${{ github.event.number }}-${{ github.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build
      - name: Reject local or placeholder frontend endpoints
        run: |
          if grep -R -E 'http://localhost|api\.example\.invalid' apps/store/dist apps/admin/dist; then
            echo 'frontend build contains a non-deployable endpoint' >&2
            exit 1
          fi

  api-preview-build:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      vars.GCP_PROJECT_ID != ''
    runs-on: ubuntu-latest
    env:
      REGION: ${{ vars.GCP_REGION }}
      IMAGE_BASE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/essesion
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build preview image
        run: docker build -t "$IMAGE_BASE/api:pr-${{ github.event.number }}" --build-arg APP=api .
