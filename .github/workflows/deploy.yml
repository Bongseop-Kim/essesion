# 스테이징 배포 — 선행: tofu apply(infra/README.md) + GitHub vars/secrets 설정
# vars: GCP_PROJECT_ID, GCP_REGION, GCP_WIF_PROVIDER, GCP_DEPLOYER_SA,
#       CLOUDFLARE_ACCOUNT_ID, VITE_API_BASE_URL, VITE_TOSS_CLIENT_KEY,
#       VITE_SENTRY_DSN, VITE_SENTRY_ENVIRONMENT
# secrets: CLOUDFLARE_API_TOKEN
name: deploy

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  backend:
    if: >-
      ((github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
       (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository)) &&
      vars.GCP_PROJECT_ID != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # WIF — 키 파일 없음
    env:
      REGION: ${{ vars.GCP_REGION }}
      IMAGE_BASE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/essesion
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      # Build before auth so google-github-actions/auth's generated credential file
      # cannot enter the Docker build context or an image layer.
      - name: Build images
        run: |
          docker build -t "$IMAGE_BASE/api:$DEPLOY_SHA" --build-arg APP=api .
          docker build -t "$IMAGE_BASE/worker:$DEPLOY_SHA" --build-arg APP=worker .
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
      - run: gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet
      - name: Push images
        run: |
          docker push "$IMAGE_BASE/api:$DEPLOY_SHA"
          docker push "$IMAGE_BASE/worker:$DEPLOY_SHA"
      # 스키마 적용 — 서비스 배포 전. 실패(비-0 종료)면 배포 중단 (잡은 max_retries=0)
      - name: Run DB migrations
        run: |
          gcloud run jobs update migrate --region "$REGION" --image "$IMAGE_BASE/api:$DEPLOY_SHA"
          gcloud run jobs execute migrate --region "$REGION" --wait
      - name: Deploy Cloud Run
        run: |
          gcloud run deploy api --region "$REGION" --image "$IMAGE_BASE/api:$DEPLOY_SHA"
          gcloud run deploy worker-generate --region "$REGION" --image "$IMAGE_BASE/worker:$DEPLOY_SHA"
          gcloud run deploy worker-finalize --region "$REGION" --image "$IMAGE_BASE/worker:$DEPLOY_SHA"

  frontend:
    needs: backend
    if: >-
      always() &&
      ((github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
       (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository)) &&
      vars.CLOUDFLARE_ACCOUNT_ID != '' &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_TOSS_CLIENT_KEY: ${{ vars.VITE_TOSS_CLIENT_KEY }}
      VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
      VITE_SENTRY_ENVIRONMENT: ${{ vars.VITE_SENTRY_ENVIRONMENT }}
      VITE_SENTRY_RELEASE: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build
      - name: Reject local or placeholder frontend endpoints
        run: |
          if grep -R -E 'http://localhost|api\.example\.invalid' apps/store/dist apps/admin/dist; then
            echo 'frontend build contains a non-deployable endpoint' >&2
            exit 1
          fi
      - name: Deploy Cloudflare workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          pnpm -C apps/store exec wrangler deploy
          pnpm -C apps/admin exec wrangler deploy
          pnpm -C infra/cloudflare/api-proxy exec wrangler deploy
