name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # 버전은 packageManager 필드에서
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm turbo build typecheck test

  py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # worker fabric/raster 테스트의 래스터라이저 — 없으면 해당 테스트가 skip돼 공백이 생긴다
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends librsvg2-bin
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - run: uv run ruff check . && uv run ruff format --check .
      - run: uv run pyright
      - run: uv run pytest

  # api 스펙만 바뀌고 api-client 생성물이 안 바뀐 채 머지되는 것을 차단 (AGENTS.md 대원칙)
  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: uv sync --all-packages
      - run: pnpm install --frozen-lockfile
      - run: pnpm codegen
      - run: git diff --exit-code -- packages/api-client

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: essesion
          POSTGRES_PASSWORD: essesion
          POSTGRES_DB: essesion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U essesion -d essesion"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENV: local
      DATABASE_URL: postgresql+asyncpg://essesion:essesion@localhost:5432/essesion
      SEED_ADMIN_PASSWORD: admin-local-password
      E2E_ADMIN_EMAIL: admin@local
      E2E_ADMIN_PASSWORD: admin-local-password
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: uv sync --all-packages
      - run: pnpm install --frozen-lockfile
      - run: uv run alembic -c db/alembic.ini upgrade head
      - run: uv run python apps/api/scripts/seed.py
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  osv-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: osv-scanner (pnpm-lock + uv.lock)
        run: |
          curl -sSL -o osv-scanner https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          chmod +x osv-scanner
          ./osv-scanner scan source -r .
